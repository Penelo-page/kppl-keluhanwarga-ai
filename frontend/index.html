<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rancangan UI Prototype - UC01</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f9fafb] text-gray-800 font-sans min-h-screen flex flex-col justify-between">

    <nav class="w-full bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center shadow-xs">
        <div class="flex items-center gap-3">
            <div class="bg-[#1a1a1a] p-2 rounded-lg text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                </svg>
            </div>
            <span class="font-semibold text-gray-700 text-sm tracking-wide">Pengaduan Warga</span>
        </div>

        <button onclick="bukaModalRiwayat()" class="flex items-center gap-2 text-sm font-medium text-gray-600 hover:text-black transition cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span>Lihat Riwayat Laporan</span>
            <span id="badgeTotal" class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-0.5 rounded-full ml-1">0</span>
        </button>
    </nav>

    <div class="flex-1 flex items-center justify-center p-4">
        <main class="bg-white w-full max-w-2xl p-8 rounded-2xl border border-gray-100 shadow-xl shadow-gray-100/50">
            
            <header class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Form Laporan Baru</h1>
                <p class="text-sm text-gray-400 mt-1 leading-relaxed">
                    Sampaikan keluhan Anda terkait fasilitas atau layanan publik. Laporan akan dikategorikan dan diprioritaskan secara otomatis oleh sistem.
                </p>
            </header>

            <form id="formKeluhan" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Judul Masalah</label>
                    <input type="text" id="judulMasalah" 
                        class="w-full p-3 bg-white border border-gray-200 rounded-lg text-sm text-gray-800 placeholder-gray-300 focus:outline-none focus:border-gray-400 transition" 
                        placeholder="Contoh: Jalan Berlubang di Depan Sekolah" required>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Deskripsi Detail</label>
                    <textarea id="teksKeluhan" rows="5" 
                        class="w-full p-3 bg-white border border-gray-200 rounded-lg text-sm text-gray-800 placeholder-gray-300 focus:outline-none focus:border-gray-400 transition resize-none" 
                        placeholder="Jelaskan detail keluhan, lokasi kejadian, dan dampak yang dirasakan..." required></textarea>
                </div>

                <button type="submit" id="btnSubmit" 
                    class="w-full bg-[#1a1a1a] hover:bg-black text-white text-sm font-medium py-3.5 rounded-lg transition shadow-sm flex justify-center items-center gap-2 cursor-pointer">
                    <svg class="w-4 h-4 transform rotate-45 -translate-y-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    <span id="textTombol">Kirim Laporan</span>
                </button>
            </form>

        </main>
    </div>

    <div id="modalRiwayat" class="hidden fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-xl rounded-2xl shadow-2xl p-6 border border-gray-100 flex flex-col max-h-[80vh]">
            
            <div class="flex items-center justify-between border-b border-gray-100 pb-4 mb-4">
                <h2 class="text-lg font-bold text-gray-900">Riwayat Laporan Anda</h2>
                <button onclick="tutupModalRiwayat()" class="text-gray-400 hover:text-gray-600 font-bold text-xl cursor-pointer">&times;</button>
            </div>

            <div id="containerHistory" class="flex-1 overflow-y-auto space-y-3 pr-1">
                <div id="emptyState" class="text-center py-12 text-gray-400 text-sm">
                    Belbelum ada riwayat pengaduan yang dimasukkan.
                </div>
            </div>
            
        </div>
    </div>

    <footer class="py-4 text-center text-xs text-gray-300 border-t border-gray-50 bg-white">
        Gambar 1. Halaman Masukkan keluhan (Prototype KPPL)
    </footer>

    <script>
        let daftarLaporan = [];
        const urlBackend = 'http://localhost:8000/api/keluhan'; 

        function bukaModalRiwayat() {
            document.getElementById('modalRiwayat').classList.remove('hidden');
        }

        function tutupModalRiwayat() {
            document.getElementById('modalRiwayat').classList.add('hidden');
        }

        function dapatkanWarnaPrioritas(prioritas) {
            const p = prioritas.toLowerCase();
            if (p === 'tinggi' || p === 'high') {
                return 'bg-red-50 text-red-700 border-red-100';
            } else if (p === 'sedang' || p === 'medium') {
                return 'bg-amber-50 text-amber-700 border-amber-100';
            } else {
                return 'bg-green-50 text-green-700 border-green-100';
            }
        }

        function renderHistory() {
            const container = document.getElementById('containerHistory');
            const emptyState = document.getElementById('emptyState');
            
            document.getElementById('badgeTotal').innerText = daftarLaporan.length;

            if (daftarLaporan.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            container.innerHTML = '';
            container.appendChild(emptyState);

            [...daftarLaporan].reverse().forEach(item => {
                const warnaPrioritas = dapatkanWarnaPrioritas(item.prioritas);
                const card = document.createElement('div');
                card.className = "p-4 border border-gray-100 rounded-xl bg-gray-50 flex flex-col gap-2";
                
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-2">
                        <h4 class="font-semibold text-sm text-gray-900">${item.judul}</h4>
                        <span class="text-[10px] bg-gray-200 text-gray-600 font-bold px-2 py-0.5 rounded uppercase tracking-wider shrink-0">
                            ${item.kategori}
                        </span>
                    </div>
                    <p class="text-xs text-gray-500 line-clamp-2">"${item.teks_keluhan}"</p>
                    <div class="flex justify-between items-center border-t border-gray-100/60 pt-2 mt-1">
                        <span class="text-[11px] text-gray-400">Baru saja</span>
                        <span class="${warnaPrioritas} border text-[11px] font-bold px-2 py-0.5 rounded">
                            Prioritas: ${item.prioritas}
                        </span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('formKeluhan').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const judul = document.getElementById('judulMasalah').value;
            const teks = document.getElementById('teksKeluhan').value;
            const btnSubmit = document.getElementById('btnSubmit');
            const textTombol = document.getElementById('textTombol');

            btnSubmit.disabled = true;
            textTombol.innerText = "Menganalisis Sistem AI...";

            try {
                // Mengirim data ke backend milik Anggota 2
                const response = await fetch(urlBackend, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        judul: judul,
                        teks_keluhan: teks 
                    })
                });

                if (!response.ok) throw new Error('Gagal memproses data server.');
                const data = await response.json(); 

                daftarLaporan.push({
                    judul: judul,
                    teks_keluhan: teks,
                    kategori: data.kategori,
                    prioritas: data.prioritas
                });

            } catch (error) {
                // JALUR DARURAT SIMULASI JIKA BACKEND BELUM COUPLING
                console.log('Mengaktifkan data simulasi lokal.');
                daftarLaporan.push({
                    judul: judul,
                    teks_keluhan: teks,
                    kategori: "Infrastruktur (Simulasi)",
                    prioritas: "Tinggi"
                });
            } finally {
                renderHistory();
                
                // Reset kolom pengisian form
                document.getElementById('judulMasalah').value = '';
                document.getElementById('teksKeluhan').value = '';

                btnSubmit.disabled = false;
                textTombol.innerText = "Kirim Laporan";

                // Otomatis bukakan pop up riwayat biar dosen langsung melihat hasilnya setelah submit!
                bukaModalRiwayat();
            }
        });
    </script>
</body>
</html>
